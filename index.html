<script>
        const noButton = document.getElementById('noBtn');
        const yesButton = document.getElementById('yesBtn');

        // This makes the "No" button run away when hovered or tapped
        noButton.addEventListener('mouseover', moveButton);
        noButton.addEventListener('touchstart', moveButton); // Added touch support for mobile!

        function moveButton(e) {
            e.preventDefault(); // Stops the button from accidentally being clicked on mobile
            const x = Math.random() * (window.innerWidth - noButton.offsetWidth);
            const y = Math.random() * (window.innerHeight - noButton.offsetHeight);

            noButton.style.position = 'absolute';
            noButton.style.left = `${x}px`;
            noButton.style.top = `${y}px`;
        }

        // What happens when she finally clicks "Yes"
        yesButton.addEventListener('click', () => {
            // This new HTML is mobile-friendly and reactive
            document.body.innerHTML = `
                <h1 style="color: #d81b60; font-size: clamp(30px, 8vw, 50px); text-align: center; padding: 0 20px; margin-bottom: 20px;">
                    I knew you'd say Yes! Let's get married! 💒❤️
                </h1>
                <img src="https://media.giphy.com/media/MeIucAjPKoA120R7sN/giphy.gif" alt="Happy Dance" style="max-width: 90%; height: auto; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
            `;
        });
    </script>
